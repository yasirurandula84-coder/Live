<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Match Broadcasting</title>
    <!-- HLS.js & Socket.io -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .header { margin-bottom: 15px; text-align: center; }
        .header h1 {
            color: #38bdf8;
            font-size: 24px;
            margin: 0;
            font-weight: 700;
        }
        .live-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 8px;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #ef4444;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .player-container {
            width: 100%;
            max-width: 850px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 16/9;
        }
        .info-bar {
            width: 100%;
            max-width: 850px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 12px 20px;
            border-radius: 0 0 16px 16px;
            margin-top: -5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: none;
            font-size: 14px;
            color: #94a3b8;
        }
        .viewers-count {
            display: flex;
            align-items: center;
            color: #38bdf8;
            font-weight: 600;
        }
        .viewers-count span {
            color: #ffffff;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Live Cricket Broadcasting</h1>
        <div class="live-badge">
            <span class="live-dot"></span> LIVE NOW
        </div>
    </div>

    <div class="player-container">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <div class="info-bar">
        <div>Quality: <strong>1080p Full HD</strong></div>
        <div class="viewers-count">
            👁️ Real-time Viewers: <span id="viewers">0</span>
        </div>
    </div>

    <script>
        const socket = io();

        // සැබෑ ඔන්ලයින් ගණන සර්වර් එකෙන් ලබා ගැනීම
        socket.on('updateViewers', (count) => {
            document.getElementById('viewers').innerText = count;
        });

        // පිරිසිදු 1080p ඩිරෙක්ට් ලින්ක් එක
        const streamUrl = "https://d36r8jifhgsk5j.cloudfront.net/Willow_TV1080p.m3u8";

        var video = document.getElementById('video');
        
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(e => console.log("Auto-play prevented:", e));
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari හෝ iPhone වැනි බිල්ට්-ඉන් ප්ලේයර් සඳහා
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play().catch(e => console.log("Auto-play prevented:", e));
            });
        }
    </script>

</body>
</html>
