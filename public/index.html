    <script>
        const socket = io();

        // සැබෑ ඔන්ලයින් ගණන සර්වර් එකෙන් ලබා ගැනීම
        socket.on('updateViewers', (count) => {
            document.getElementById('viewers').innerText = count;
        });

        // මෙන්න මෙතැන ප්‍රොක්සි නැතුව කෙලින්ම ලින්ක් එක දාන්න
        const streamUrl = "https://d36r8jifhgsk5j.cloudfront.net/Willow_TV1080p.m3u8";

        var video = document.getElementById('video');
        
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(e => console.log("Auto-play prevented:", e));
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari හෝ iPhone වල බිල්ට්-ඉන් ප්ලේයර් එක සඳහා
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play().catch(e => console.log("Auto-play prevented:", e));
            });
        }
    </script>
