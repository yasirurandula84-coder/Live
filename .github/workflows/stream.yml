name: FB Live Streamer

on:
  workflow_dispatch:
    inputs:
      stream_key:
        description: 'Facebook Stream Key'
        required: true
        type: string

jobs:
  start-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Download Shaka Packager
        run: |
          curl -L https://github.com/shaka-project/shaka-packager/releases/download/v2.6.1/packager-linux-x64 -o packager
          chmod +x packager

      - name: Start Decrypted Stream to Facebook
        run: |
          ./packager \
            'in=https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/dash/enc/jpjzsonseg/out/v1/26eeb47cccd24e2d8e1975655a1f04e9/cenc.mpd,stream=video,output=-' \
            'in=https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/dash/enc/jpjzsonseg/out/v1/26eeb47cccd24e2d8e1975655a1f04e9/cenc.mpd,stream=audio,output=-' \
            --keys kid=fe6dc83d53e08c5626b6aec2bb4a3afe:key=da58f6323d6388054bd316890f729f72 \
          | ffmpeg -re -i - \
            -c:v libx264 -preset ultrafast -tune zerolatency \
            -c:a aac -b:a 128k \
            -f flv \
            "rtmps://live-api-s.facebook.com:443/rtmp/${{ github.event.inputs.stream_key }}"
